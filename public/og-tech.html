<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #0a0a0a; /* neutral-950 */
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    color: #fafafa; /* neutral-50 */
    overflow: hidden;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .icon {
    width: 80px;
    height: 80px;
    stroke: #3b82f6; /* blue-500 */
    fill: none;
    stroke-width: 2;
  }
  .brand {
    font-size: 100px;
    font-weight: 500;
    letter-spacing: -0.05em; /* tracking-tight */
    line-height: 1;
  }
  .tld {
    color: #737373; /* neutral-500 */
  }
</style>
</head>
<body>
  <div class="logo">
    <svg class="icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 17 10 11 4 5"></polyline>
      <line x1="12" y1="19" x2="20" y2="19"></line>
    </svg>
    <div class="brand">prodevelopers<span class="tld">.tech</span></div>
  </div>
</body>
</html>
